<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Martin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scanlines" aria-hidden="true"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="" class="lightbox-img" />
  </div>

  <main class="card-wrapper">

    <a href="index.html" class="back-link">← martin's page 🦊</a>

    <div class="card">
      <div class="card-topbar">
        <div class="topbar-nav">
          <a href="projects.html" class="topbar-link">projects</a>
          <span class="topbar-sep">·</span>
          <a href="artworks.html" class="topbar-link">artworks</a>
          <span class="topbar-sep">·</span>
          <a href="gallery.html" class="topbar-link topbar-link-active">gallery</a>
        </div>
        <div class="topbar-dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
      </div>

      <div class="page-content">
        <h2 class="page-title">Gallery<span class="exclaim">.</span></h2>
        <div class="dashed-divider"></div>

        <div id="photoCount" class="gallery-count"></div>

        <div id="photoGrid" class="art-grid gallery-grid">
          <div class="art-card skeleton-card"></div>
          <div class="art-card skeleton-card"></div>
          <div class="art-card skeleton-card"></div>
          <div class="art-card skeleton-card"></div>
          <div class="art-card skeleton-card"></div>
          <div class="art-card skeleton-card"></div>
        </div>
      </div>

      <div class="card-footer">@foxfoxesfox</div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    let currentIndex = 0;
    let currentPhotos = [];

    function openLightboxAt(index) {
      currentIndex = index;
      document.getElementById('lightboxImg').src = 'assets/photos/' + currentPhotos[index].file;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox').addEventListener('click', closeLightbox);

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowRight') openLightboxAt((currentIndex + 1) % currentPhotos.length);
      if (e.key === 'ArrowLeft')  openLightboxAt((currentIndex - 1 + currentPhotos.length) % currentPhotos.length);
    });

    async function loadGallery() {
      const grid  = document.getElementById('photoGrid');
      const count = document.getElementById('photoCount');

      try {
        const res = await fetch('assets/photos/photos.json');
        if (!res.ok) throw new Error();
        currentPhotos = await res.json();
      } catch {
        grid.innerHTML = `<p style="color:var(--text-muted);font-family:var(--font-mono);font-size:0.82rem;grid-column:1/-1;padding:20px 0">No photos found. Add images to <code>assets/photos/</code> and update <code>photos.json</code>.</p>`;
        return;
      }

      count.textContent = `${currentPhotos.length} photo${currentPhotos.length !== 1 ? 's' : ''}`;

      grid.innerHTML = '';
      currentPhotos.forEach((photo, i) => {
        const card = document.createElement('div');
        card.className = 'art-card gallery-card';
        card.innerHTML = `<img src="assets/photos/${photo.file}" alt="" loading="lazy" class="art-img gallery-img" />`;
        card.addEventListener('click', () => openLightboxAt(i));
        grid.appendChild(card);
      });
    }

    loadGallery();
  </script>

</body>
</html>
