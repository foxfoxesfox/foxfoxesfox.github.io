<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artworks — Martin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scanlines" aria-hidden="true"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="" class="lightbox-img" />
    <div id="lightboxCaption" class="lightbox-caption"></div>
  </div>

  <main class="card-wrapper">

    <a href="index.html" class="back-link">martin's page 🦊</a>

    <div class="card">
      <div class="card-topbar">
        <div class="topbar-nav">
          <a href="projects.html" class="topbar-link">projects</a>
          <span class="topbar-sep">·</span>
          <a href="artworks.html" class="topbar-link topbar-link-active">artworks</a>
          <span class="topbar-sep">·</span>
          <a href="gallery.html" class="topbar-link">gallery</a>
        </div>
        <div class="topbar-dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
      </div>

      <div class="page-content">
        <h2 class="page-title">Artworks<span class="exclaim">.</span></h2>
        <!-- <p class="page-subtitle">Digital &amp; physical work.</p> -->
        <div class="dashed-divider"></div>

        <!-- Digital section -->
        <div class="section-label" style="margin-bottom:14px">Digital</div>
        <div id="digitalGrid" class="art-grid art-grid-digital">
          <div class="art-card skeleton-card"></div>
        </div>

        <div class="dashed-divider"></div>

        <!-- Physical section -->
        <div class="section-label" style="margin-bottom:14px">Physical</div>
        <div id="physicalGrid" class="art-grid">
          <div class="art-card skeleton-card"></div>
          <div class="art-card skeleton-card"></div>
          <div class="art-card skeleton-card"></div>
          <div class="art-card skeleton-card"></div>
        </div>

      </div>

      <div class="card-footer">@foxfoxesfox</div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    // ── Lightbox ──────────────────────────────────────────
    let currentIndex = 0;
    let currentItems = [];

    function openLightboxAt(index) {
      currentIndex = index;
      const item = currentItems[index];
      document.getElementById('lightboxImg').src = 'assets/artworks/' + item.file;
      document.getElementById('lightboxCaption').textContent = [item.title, item.sub].filter(Boolean).join(' · ');
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowRight')  openLightboxAt((currentIndex + 1) % currentItems.length);
      if (e.key === 'ArrowLeft')   openLightboxAt((currentIndex - 1 + currentItems.length) % currentItems.length);
    });

    document.getElementById('lightbox').addEventListener('click', closeLightbox);

    // ── Build a grid from an array of items ──────────────
    function buildGrid(gridEl, items, startIndex) {
      gridEl.innerHTML = '';
      items.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'art-card';
        card.innerHTML = `
          <img src="assets/artworks/${item.file}" alt="${item.title}" loading="lazy" class="art-img" />
          <div class="art-overlay">
            <div class="art-title">${item.title}</div>
            ${item.sub ? `<div class="art-sub">${item.sub}</div>` : ''}
          </div>
        `;
        card.addEventListener('click', () => openLightboxAt(startIndex + i));
        gridEl.appendChild(card);
      });
    }

    // ── Load artworks from manifest ───────────────────────
    async function loadArtworks() {
      const digitalGrid  = document.getElementById('digitalGrid');
      const physicalGrid = document.getElementById('physicalGrid');

      let artworks = [];
      try {
        const res = await fetch('assets/artworks/artworks.json');
        if (!res.ok) throw new Error('manifest not found');
        artworks = await res.json();
      } catch (err) {
        digitalGrid.innerHTML  = `<p style="color:var(--text-muted);font-family:var(--font-mono);font-size:0.82rem">Could not load artworks.json</p>`;
        physicalGrid.innerHTML = '';
        return;
      }

      const digital  = artworks.filter(a => a.category === 'digital');
      const physical = artworks.filter(a => a.category === 'physical');

      // currentItems is the full list for arrow key nav across both grids
      currentItems = artworks;

      buildGrid(digitalGrid,  digital,  0);
      buildGrid(physicalGrid, physical, digital.length);
    }

    loadArtworks();
  </script>

</body>
</html>
